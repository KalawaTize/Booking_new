{% extends "base.html" %}
{% block title %}Mon Profil — TicketBooking{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">
                    <i class="bi bi-person-circle"></i> Mon Profil
                </h2>

                <form method="POST" action="{{ url_for('auth.profile') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- Nom -->
                    <div class="mb-3">
                        <label for="nom" class="form-label">Nom complet</label>
                        <input type="text" class="form-control" id="nom" name="nom" 
                               value="{{ current_user.nom }}" required>
                    </div>

                    <!-- Email (lecture seule) -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Adresse email</label>
                        <input type="email" class="form-control" id="email" 
                               value="{{ current_user.email }}" disabled>
                        <div class="form-text">L'email ne peut pas être modifié.</div>
                    </div>

                    <!-- Rôle (lecture seule) -->
                    <div class="mb-3">
                        <label class="form-label">Rôle</label>
                        <input type="text" class="form-control" 
                               value="{{ 'Administrateur' if current_user.is_admin() else 'Utilisateur' }}" 
                               disabled>
                    </div>

                    <hr>
                    <h5>Changer le mot de passe (optionnel)</h5>

                    <!-- Nouveau mot de passe -->
                    <div class="mb-3">
                        <label for="new_password" class="form-label">Nouveau mot de passe</label>
                        <input type="password" class="form-control" id="new_password" 
                               name="new_password" placeholder="Laisser vide pour ne pas changer">
                    </div>

                    <!-- Confirmation -->
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirmer le nouveau mot de passe</label>
                        <input type="password" class="form-control" id="confirm_password" 
                               name="confirm_password">
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-check-lg"></i> Enregistrer les modifications
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
