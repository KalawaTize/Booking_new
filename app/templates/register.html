{% extends "base.html" %}
{% block title %}Inscription — TicketBooking{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-4">
                <h2 class="text-center mb-4">
                    <i class="bi bi-person-plus"></i> Inscription
                </h2>

                <form method="POST" action="{{ url_for('auth.register') }}">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

                    <!-- Nom complet -->
                    <div class="mb-3">
                        <label for="nom" class="form-label">Nom complet</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="nom" name="nom" 
                                   value="{{ nom|default('') }}" placeholder="Jean Dupont" required>
                        </div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label">Adresse email</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                            <input type="email" class="form-control" id="email" name="email" 
                                   value="{{ email|default('') }}" placeholder="votre@email.com" required>
                        </div>
                    </div>

                    <!-- Mot de passe -->
                    <div class="mb-3">
                        <label for="password" class="form-label">Mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" 
                                   placeholder="Minimum 6 caractères" required>
                        </div>
                        <div class="form-text">Le mot de passe doit contenir au moins 6 caractères.</div>
                    </div>

                    <!-- Confirmation mot de passe -->
                    <div class="mb-3">
                        <label for="confirm_password" class="form-label">Confirmer le mot de passe</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" id="confirm_password" 
                                   name="confirm_password" placeholder="Retapez votre mot de passe" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100">
                        <i class="bi bi-person-plus"></i> S'inscrire
                    </button>
                </form>

                <hr>
                <p class="text-center mb-0">
                    Déjà un compte ? <a href="{{ url_for('auth.login') }}">Se connecter</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
